# Soundboard configuration
# Place this file at ~/.config/soundboard/config.toml

# Audio output device (optional)
# If not specified, uses the default audio output device
# For PipeWire/PulseAudio, use the sink name shown by `pactl list short sinks`
# Example: "alsa_output.pci-0000_00_1f.3.analog-stereo"
output_device = ""

# Example with a specific device:
# output_device = "alsa_output.usb-Logitech_Logitech_USB_Headset-00.analog-stereo"
